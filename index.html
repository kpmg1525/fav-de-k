<style>
  /* ============================================================
     PALETA — buganvilia + tinta aubergine + jade + oro (para el N.º1)
     ============================================================ */
  :root {
    --paper:      #FBF5F3;   /* papel rosado cálido */
    --paper-2:    #F3E9E6;   /* tarjetas */
    --ink:        #241A22;   /* tinta casi negra con tinte ciruela */
    --ink-soft:   #6E5E67;   /* texto secundario */
    --line:       #E2D2CD;   /* líneas finas */
    --buga:       #C21E6E;   /* acento buganvilia */
    --buga-deep:  #97124F;
    --jade:       #1F6E56;   /* secundario tranquilo */
    --gold:       #B08319;   /* reservado SOLO para el N.º 1 */
    --gold-soft:  #E7D9A8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper:    #1A1218;
      --paper-2:  #241823;
      --ink:      #F6ECEF;
      --ink-soft: #B79CA9;
      --line:     #3A2A34;
      --buga:     #F25AA0;
      --buga-deep:#F887BB;
      --jade:     #5FC7A3;
      --gold:     #E7C766;
      --gold-soft:#4A3C1A;
    }
  }
  :root[data-theme="light"] {
    --paper:#FBF5F3; --paper-2:#F3E9E6; --ink:#241A22; --ink-soft:#6E5E67;
    --line:#E2D2CD; --buga:#C21E6E; --buga-deep:#97124F; --jade:#1F6E56;
    --gold:#B08319; --gold-soft:#E7D9A8;
  }
  :root[data-theme="dark"] {
    --paper:#1A1218; --paper-2:#241823; --ink:#F6ECEF; --ink-soft:#B79CA9;
    --line:#3A2A34; --buga:#F25AA0; --buga-deep:#F887BB; --jade:#5FC7A3;
    --gold:#E7C766; --gold-soft:#4A3C1A;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .display {
    font-family: "Didot", "Bodoni 72", "Playfair Display", Georgia, "Times New Roman", serif;
  }

  .wrap { max-width: 1040px; margin: 0 auto; padding: 0 22px; }

  /* ---------- MASTHEAD ---------- */
  header.masthead {
    text-align: center;
    padding: 68px 22px 40px;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    font-size: 12px; letter-spacing: .32em; text-transform: uppercase;
    color: var(--buga); font-weight: 600;
  }
  .masthead h1 {
    font-size: clamp(52px, 13vw, 128px);
    line-height: .9; margin: .18em 0 .12em;
    font-weight: 400; letter-spacing: -.01em; text-wrap: balance;
  }
  .masthead h1 em { font-style: italic; color: var(--buga); }
  .tagline {
    font-size: clamp(16px, 2.4vw, 21px); color: var(--ink-soft);
    max-width: 34ch; margin: 6px auto 0; text-wrap: balance;
  }
  .credits {
    margin-top: 22px; font-size: 12.5px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--ink-soft);
  }
  .credits b { color: var(--ink); font-weight: 600; }

  /* ---------- BARRA DE UBICACIÓN (filtro lateral) ---------- */
  .zonas-bar {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .zonas-bar .wrap { display: flex; flex-direction: column; gap: 10px; padding-top: 12px; padding-bottom: 12px; }
  .filtro-fila { display: flex; align-items: center; gap: 14px; }
  .zonas-label {
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 600; flex: none;
    min-width: 72px;
  }
  .zonas {
    display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
    -webkit-overflow-scrolling: touch; padding-bottom: 2px;
  }
  .zonas::-webkit-scrollbar { display: none; }
  .zona-btn {
    flex: none; cursor: pointer; font-family: inherit;
    font-size: 13px; letter-spacing: .04em;
    color: var(--ink-soft); background: transparent;
    border: 1px solid var(--line); border-radius: 100px;
    padding: 7px 16px; white-space: nowrap; transition: all .15s;
  }
  .zona-btn:hover { color: var(--buga); border-color: var(--buga); }
  .zona-btn[aria-pressed="true"] {
    color: #fff; background: var(--ink); border-color: var(--ink); font-weight: 600;
  }
  .plan-btn:hover { color: var(--jade); border-color: var(--jade); }
  .plan-btn[aria-pressed="true"] {
    color: #fff; background: var(--jade); border-color: var(--jade); font-weight: 600;
  }
  .zona-btn .cuenta { opacity: .55; margin-left: 6px; font-variant-numeric: tabular-nums; }

  /* ---------- SECCIÓN ---------- */
  section.seccion { padding: 54px 0 8px; }
  .sec-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 28px; }
  .sec-num {
    font-family: "Didot","Bodoni 72",Georgia,serif;
    font-size: 15px; color: var(--buga); font-variant-numeric: tabular-nums;
    border: 1px solid var(--buga); border-radius: 50%;
    width: 34px; height: 34px; flex: none;
    display: grid; place-items: center;
  }
  .sec-head h2 {
    font-size: clamp(26px, 5vw, 40px); margin: 0; font-weight: 400;
    letter-spacing: -.01em; line-height: 1;
  }
  .sec-head .zona {
    margin-left: auto; font-size: 12px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--ink-soft); align-self: center;
  }

  /* ---------- TARJETA #1 (el favorito) ---------- */
  .featured {
    display: grid; grid-template-columns: 1.05fr 1fr; gap: 0;
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 4px; overflow: hidden; margin-bottom: 26px;
    position: relative;
  }
  .featured .foto { min-height: 320px; }
  .featured .cuerpo { padding: 34px 34px 30px; display: flex; flex-direction: column; }
  .num1-badge {
    display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
    font-size: 11px; letter-spacing: .22em; text-transform: uppercase; font-weight: 700;
    color: var(--gold); border: 1px solid var(--gold); border-radius: 100px;
    padding: 5px 13px; margin-bottom: 16px;
  }
  .num1-badge svg { width: 14px; height: 14px; fill: var(--gold); }
  .featured h3 { font-size: clamp(30px, 5vw, 46px); }

  /* ---------- GRID DE LOS DEMÁS ---------- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 20px; margin-bottom: 12px; }
  .card {
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 4px; overflow: hidden; display: flex; flex-direction: column;
  }
  .card .foto { aspect-ratio: 4 / 3; }
  .card .cuerpo { padding: 18px 18px 16px; display: flex; flex-direction: column; flex: 1; }

  /* piezas comunes */
  h3 { font-family:"Didot","Bodoni 72","Playfair Display",Georgia,serif;
       margin: 0 0 6px; font-weight: 400; letter-spacing: -.01em; line-height: 1.02;
       text-wrap: balance; }
  .card h3 { font-size: 24px; }
  .meta { font-size: 11.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--jade); font-weight: 600; margin-bottom: 10px; }
  .nota { color: var(--ink-soft); font-size: 15px; margin: 0 0 16px; }
  .featured .nota { font-size: 16.5px; max-width: 42ch; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .tag { font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
         color: var(--buga); border: 1px solid var(--line); border-radius: 100px; padding: 3px 10px; }
  .row-bottom { margin-top: auto; display: flex; align-items: center; gap: 12px; }

  /* botón mapa */
  .mapa {
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase; font-weight: 600;
    color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--buga);
    padding-bottom: 1px; transition: color .15s;
  }
  .mapa:hover { color: var(--buga); }

  /* corazón "yo le entro" */
  .fav {
    margin-left: auto; background: none; border: 1px solid var(--line);
    border-radius: 100px; cursor: pointer; color: var(--ink-soft);
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
    font-family: inherit; font-size: 12px; letter-spacing: .1em; text-transform: uppercase;
    transition: all .15s;
  }
  .fav svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; transition: transform .15s; }
  .fav:hover { color: var(--buga); border-color: var(--buga); }
  .fav[aria-pressed="true"] { color: #fff; background: var(--buga); border-color: var(--buga); }
  .fav[aria-pressed="true"] svg { fill: #fff; stroke: #fff; transform: scale(1.05); }
  :root[data-theme="dark"] .fav[aria-pressed="true"], @media (prefers-color-scheme: dark) { }

  /* foto: imagen + placeholder detrás */
  .foto { position: relative; background: linear-gradient(135deg, var(--buga-deep), var(--jade)); }
  .foto img { width: 100%; height: 100%; object-fit: cover; display: block; position: relative; z-index: 1; }
  .foto .ph {
    position: absolute; inset: 0; z-index: 0; display: grid; place-items: center; text-align: center;
    color: #fff; padding: 20px;
  }
  .foto .ph span { font-family:"Didot",Georgia,serif; font-size: 18px; opacity: .9; }
  .foto .ph small { display:block; font-size: 11px; letter-spacing:.14em; text-transform:uppercase; opacity:.65; margin-top:6px; }

  /* ---------- BARRA FLOTANTE (conteo de escogidos) ---------- */
  .tally {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper);
    padding: 11px 20px; border-radius: 100px; font-size: 13px;
    letter-spacing: .06em; box-shadow: 0 8px 30px rgba(0,0,0,.28);
    display: flex; align-items: center; gap: 12px; z-index: 50;
    opacity: 0; transform: translate(-50%, 16px); pointer-events: none; transition: all .28s ease;
  }
  .tally.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  .tally b { color: var(--buga-deep); font-weight: 700; }
  :root[data-theme="dark"] .tally b, .tally b { color: #F25AA0; }
  .tally button {
    background: none; border: 1px solid rgba(255,255,255,.3); color: var(--paper);
    border-radius: 100px; padding: 4px 12px; font-family: inherit; font-size: 12px;
    cursor: pointer; letter-spacing: .08em;
  }
  .tally button:hover { border-color: var(--paper); }

  footer { text-align: center; padding: 60px 22px 120px; color: var(--ink-soft); font-size: 14px; }
  footer .display { font-size: 22px; color: var(--ink); display: block; margin-bottom: 6px; }

  a:focus-visible, button:focus-visible { outline: 2px solid var(--buga); outline-offset: 3px; border-radius: 4px; }

  @media (max-width: 720px) {
    .featured { grid-template-columns: 1fr; }
    .featured .foto { min-height: 240px; aspect-ratio: 4/3; }
    .sec-head .zona { display: none; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>

        nombre: "El café que amo",
        meta: "Roma Norte · Café de especialidad",
        nota: "Mi oficina no oficial. Wifi, luz bonita y el mejor flat white de la zona.",
        tags: ["Trabajar aquí", "Especialidad"],
        foto: "",
        mapa: ""
      },
      {
        rank: 2,
        nombre: "Postres imperdibles",
        meta: "Del Valle · Repostería",
        nota: "Vengo solo por el pan. No juzgues.",
        tags: ["Dulce"],
        foto: "",
        mapa: ""
      }
    ]
  }
  /* ← ¿Quieres otra sección (Bares, Tacos, Museos...)? Copia un bloque
       { seccion, zona, lugares:[...] } completo y pégalo aquí. */
];

/* ============================================================================
   👆👆👆  HASTA AQUÍ EDITAS. De aquí para abajo es la maquinaria.  👆👆👆
   ============================================================================ */

const heart = '<svg viewBox="0 0 24 24"><path d="M12 21s-7.5-4.9-10-9.2C.3 8.4 2 5 5.3 5c2 0 3.4 1.2 4.2 2.5C10.3 6.2 11.7 5 13.7 5 17 5 18.7 8.4 17 11.8 14.5 16.1 12 21 12 21z"/></svg>';
const crown = '<svg viewBox="0 0 24 24"><path d="M3 7l4 4 5-7 5 7 4-4-2 12H5L3 7z"/></svg>';

const store = {
  key: "guia-favs",
  get() { try { return JSON.parse(localStorage.getItem(this.key)) || {}; } catch(e){ return {}; } },
  set(v) { try { localStorage.setItem(this.key, JSON.stringify(v)); } catch(e){} }
};

function foto(l) {
  const ph = `<div class="ph"><div><span>${escapeHtml(l.nombre)}</span><small>agrega tu foto aquí</small></div></div>`;
  if (!l.foto) return `<div class="foto">${ph}</div>`;
  return `<div class="foto">${ph}<img src="${escapeAttr(l.foto)}" alt="${escapeAttr(l.nombre)}" loading="lazy" onerror="this.style.display='none'"></div>`;
}
function tags(l) {
  if (!l.tags || !l.tags.length) return "";
  return `<div class="tags">${l.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>`;
}
function mapa(l) {
  return l.mapa ? `<a class="mapa" href="${escapeAttr(l.mapa)}" target="_blank" rel="noopener">Ver en mapa ↗</a>` : "";
}
function favBtn(id) {
  return `<button class="fav" data-id="${escapeAttr(id)}" aria-pressed="false">${heart}<span>Yo le entro</span></button>`;
}

/* --- Ubicaciones: se derivan de lo que va antes del "·" en cada meta --- */
const getZona = (l) => {
  const raw = (l.meta || "").split("·")[0].trim() || "Otros";
  return (typeof ZONA_ALIAS !== "undefined" && ZONA_ALIAS[raw]) || raw;
};
const ZONA_ORDEN = ["Coyoacán", "San Ángel", "Roma / Tacubaya / Juárez", "Del Valle"]; // orden preferido
let FILTRO = "Todos";   // ubicación seleccionada
let PLAN   = "Todos";   // tipo de plan seleccionado (nombre de la sección)

function zonasDisponibles() {
  const set = [];
  SECCIONES.forEach(s => s.lugares.forEach(l => { const z = getZona(l); if (!set.includes(z)) set.push(z); }));
  return set.sort((a,b) => {
    const ia = ZONA_ORDEN.indexOf(a), ib = ZONA_ORDEN.indexOf(b);
    return (ia<0?99:ia) - (ib<0?99:ib);
  });
}

const matchZona = (l) => FILTRO === "Todos" || getZona(l) === FILTRO;
const matchPlan = (s) => PLAN === "Todos" || s.seccion === PLAN;

/* Los contadores respetan el OTRO filtro activo, para que siempre reflejen
   lo que verías al combinar ambos. */
function contarZona(z)  { return SECCIONES.reduce((n,s)=> n + (matchPlan(s) ? s.lugares.filter(l=>getZona(l)===z).length : 0), 0); }
function totalZonas()   { return SECCIONES.reduce((n,s)=> n + (matchPlan(s) ? s.lugares.length : 0), 0); }
function contarPlan(s)  { return s.lugares.filter(matchZona).length; }
function totalPlanes()  { return SECCIONES.reduce((n,s)=> n + s.lugares.filter(matchZona).length, 0); }

function renderTabs() {
  // ---- Ubicación ----
  const zTabs = [["Todos", totalZonas()], ...zonasDisponibles().map(z => [z, contarZona(z)])];
  const zEl = document.getElementById("zonas");
  zEl.innerHTML = zTabs.map(([z,n]) =>
    `<button class="zona-btn" data-zona="${escapeAttr(z)}" aria-pressed="${z===FILTRO}">${escapeHtml(z)}<span class="cuenta">${n}</span></button>`
  ).join("");
  zEl.querySelectorAll(".zona-btn").forEach(b => b.addEventListener("click", () => setFiltro("zona", b.dataset.zona)));

  // ---- Tipo de plan ----
  const pTabs = [["Todos", totalPlanes()], ...SECCIONES.map(s => [s.seccion, contarPlan(s)])];
  const pEl = document.getElementById("planes");
  pEl.innerHTML = pTabs.map(([p,n]) =>
    `<button class="zona-btn plan-btn" data-plan="${escapeAttr(p)}" aria-pressed="${p===PLAN}">${escapeHtml(p)}<span class="cuenta">${n}</span></button>`
  ).join("");
  pEl.querySelectorAll(".plan-btn").forEach(b => b.addEventListener("click", () => setFiltro("plan", b.dataset.plan)));
}

function setFiltro(tipo, valor) {
  if (tipo === "zona") FILTRO = valor; else PLAN = valor;
  renderTabs();
  render();
}

function render() {
  const favs = store.get();
  const app = document.getElementById("app");
  let visibles = 0;

  app.innerHTML = SECCIONES.map((sec) => {
    if (!matchPlan(sec)) return "";
    let lugares = sec.lugares.filter(matchZona);
    if (!lugares.length) return "";
    lugares = lugares.slice().sort((a,b)=>(a.rank||99)-(b.rank||99));
    visibles++;

    const first = lugares[0];
    const rest = lugares.slice(1);
    const idOf = (l)=>`${sec.seccion}·${l.nombre}`;
    const zonasSec = [...new Set(lugares.map(getZona))].join(" · ");

    const featured = `
      <article class="featured">
        ${foto(first)}
        <div class="cuerpo">
          <span class="num1-badge">${crown} El favorito</span>
          <h3 class="display">${escapeHtml(first.nombre)}</h3>
          <div class="meta">${escapeHtml(first.meta||"")}</div>
          <p class="nota">${escapeHtml(first.nota||"")}</p>
          ${tags(first)}
          <div class="row-bottom">${mapa(first)}${favBtn(idOf(first))}</div>
        </div>
      </article>`;

    const grid = rest.length ? `<div class="grid">${rest.map((l)=>`
      <article class="card">
        ${foto(l)}
        <div class="cuerpo">
          <h3>${escapeHtml(l.nombre)}</h3>
          <div class="meta">${escapeHtml(l.meta||"")}</div>
          <p class="nota">${escapeHtml(l.nota||"")}</p>
          ${tags(l)}
          <div class="row-bottom">${mapa(l)}${favBtn(idOf(l))}</div>
        </div>
      </article>`).join("")}</div>` : "";

    return `<section class="seccion">
      <div class="sec-head">
        <span class="sec-num display">${visibles}</span>
        <h2 class="display">${escapeHtml(sec.seccion)}</h2>
        <span class="zona">${escapeHtml(zonasSec)}</span>
      </div>
      ${featured}${grid}
    </section>`;
  }).join("");

  if (!visibles) {
    app.innerHTML = `<section class="seccion" style="text-align:center;padding:80px 0;color:var(--ink-soft)">
      <p class="display" style="font-size:26px;color:var(--ink)">Nada con esa combinación… todavía.</p>
      <p>Prueba con otra ubicación o tipo de plan.</p>
      <button class="zona-btn" style="margin-top:16px" onclick="setFiltro('zona','Todos');setFiltro('plan','Todos')">Quitar filtros</button>
    </section>`;
  }

  document.getElementById("curador").textContent = CURADOR;
  document.querySelectorAll(".fav").forEach(b => {
    if (favs[b.dataset.id]) { b.setAttribute("aria-pressed","true"); b.querySelector("span").textContent = "Le entras ✓"; }
    b.addEventListener("click", () => toggle(b));
  });
  updateTally();
}

function toggle(btn) {
  const favs = store.get();
  const on = btn.getAttribute("aria-pressed") === "true";
  if (on) { delete favs[btn.dataset.id]; btn.setAttribute("aria-pressed","false"); btn.querySelector("span").textContent="Yo le entro"; }
  else { favs[btn.dataset.id] = true; btn.setAttribute("aria-pressed","true"); btn.querySelector("span").textContent="Le entras ✓"; }
  store.set(favs);
  updateTally();
}

function updateTally() {
  const n = Object.keys(store.get()).length;
  document.getElementById("tally-n").textContent = n;
  document.getElementById("tally").classList.toggle("show", n > 0);
}
document.getElementById("tally-reset").addEventListener("click", () => { store.set({}); render(); });

function escapeHtml(s){ return String(s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escapeAttr(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

renderTabs();
render();
</script>
</body>
</html>
